<!doctype html>
<html lang="id">
<head>

<!-- Tailwind (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>

    theme: {

        colors: {
          brand: { DEFAULT: '#3D1FB8', hover: '#311894', light: '#EFEBFF', accent: '#5A3BE8' },
          ink: { DEFAULT: '#1A1525', soft: '#6A6577', faint: '#B4B0C0' },
          surface: { DEFAULT: '#FFFFFF', bg: '#F8F7FB' },
        },
        fontFamily: {
          display: ['Outfit', 'system-ui', 'sans-serif'],
          sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
        },
        boxShadow: {
          soft: '0 8px 30px rgba(61,31,184,0.08)',
          glow: '0 4px 18px rgba(61,31,184,0.35)',

        borderRadius: { '4xl': '2rem' },

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script src="app.js"></script>
